# Static serving for the built SPA.
#
# NOTE: src/api.js calls the backend at an absolute URL (http://127.0.0.1:8000),
# and docker-compose publishes the backend on host port 8000, so the browser
# reaches it directly — no proxy needed for local use. CORS is open on the API.
#
# For a production/single-origin deploy, set the frontend to call a relative
# "/api/v1" base and uncomment the proxy block below (point it at the backend
# service name on the compose network).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The shell must always revalidate: a heuristically-cached index.html
    # keeps pointing at hashed assets deleted by the next image rebuild,
    # which renders as a permanently blank page even with a healthy backend.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Long-cache fingerprinted assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Optional single-origin reverse proxy (see note above) ---
    # location /api/ {
    #     proxy_pass         http://backend:8000;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host $host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_buffering    off;   # required for SSE streaming (/query/stream)
    # }
}
